<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Арк</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
[data-theme="dark"] {
  --bg:        #0a0a0c;
  --sidebar:   #101012;
  --card:      #161618;
  --card2:     #1e1e22;
  --raised:    #25252b;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.11);
  --text:      #f0f0f4;
  --text2:     #b0b0c0;
  --text3:     #66667a;
  --accent:    #c084fc;
  --accent2:   #60a5fa;
  --user-bg:   #27272f;
  --code-bg:   #111113;
  --shadow:    rgba(0,0,0,0.75);
  --hover:     rgba(255,255,255,0.055);
  --active:    rgba(192,132,252,0.12);
  --glow:      rgba(192,132,252,0.18);
  --glow2:     rgba(96,165,250,0.12);
}

[data-theme="light"] {
  --bg:        #f8f8fa;
  --sidebar:   #f0f0f3;
  --card:      #e8e8eb;
  --card2:     #e0e0e4;
  --raised:    #d8d8dc;
  --border:    #e0e0e4;
  --border2:   #d0d0d5;
  --text:      #111113;
  --text2:     #66667a;
  --text3:     #a0a0b0;
  --accent:    #9f5cf4;
  --accent2:   #3b8cf0;
  --user-bg:   #e8e8eb;
  --code-bg:   #f0f0f3;
  --shadow:    rgba(0,0,0,0.12);
  --hover:     rgba(0,0,0,0.04);
  --active:    rgba(159,92,244,0.1);
}

/* ── BASE ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; height:100dvh; overflow:hidden; font-family:'Geist', system-ui, sans-serif; }

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* Ambient premium glow */
body::before {
  content: '';
  position: fixed;
  top: -40%;
  left: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(ellipse, var(--glow) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
  animation: amb-float 18s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%;
  right: -15%;
  width: 65%;
  height: 65%;
  background: radial-gradient(ellipse, var(--glow2) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
  animation: amb-float 14s ease-in-out infinite alternate-reverse;
}
@keyframes amb-float {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, 30px) scale(1.15); }
}

/* ── SIDEBAR ── */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 30;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  box-shadow: 4px 0 30px -10px rgba(0,0,0,0.3);
}

.sb-header {
  padding: 18px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.sb-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sb-brand-dot {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, #c084fc, #60a5fa);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 22px rgba(192,132,252,0.55),
              inset 0 1px 0 rgba(255,255,255,0.3);
}

.sb-brand-name {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, #f0f0f4, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.new-chat {
  margin: 8px 12px 12px;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 13.5px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.new-chat:hover {
  background: var(--active);
  border-color: #c084fc;
  color: var(--text);
  transform: translateY(-1px);
}

/* Chat list */
#chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 12px;
}
.chat-item {
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text2);
  font-size: 13.5px;
  transition: all 0.2s ease;
  position: relative;
}
.chat-item:hover { background: var(--hover); color: var(--text); }
.chat-item.active {
  background: rgba(192,132,252,0.12);
  color: var(--text);
  box-shadow: inset 3px 0 0 #c084fc;
}

/* Bottom user */
.sb-bottom {
  padding: 12px;
  border-top: 1px solid var(--border);
}

.sb-user {
  padding: 8px 12px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.sb-user:hover { background: var(--hover); }

/* ── MAIN AREA ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
  min-width: 0;
}

/* Header */
header {
  height: 56px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.model-pill {
  padding: 6px 14px;
  border-radius: 9999px;
  border: 1px solid var(--border2);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.model-pill:hover {
  background: var(--hover);
  border-color: #c084fc;
}

/* Messages */
#msgs {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 32px;
  scroll-behavior: smooth;
}

.mg {
  display: flex;
  max-width: 760px;
  animation: msg-in 0.3s cubic-bezier(0.23,1,0.32,1);
}

.mg.user { margin-left: auto; flex-direction: row-reverse; }

.av {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}

.av.ark {
  background: linear-gradient(135deg, #c084fc, #60a5fa);
  box-shadow: 0 0 18px rgba(192,132,252,0.4);
}

.bubble {
  padding: 15px 20px;
  border-radius: 20px;
  font-size: 15.5px;
  line-height: 1.65;
  max-width: 100%;
}

.bubble.user {
  background: var(--user-bg);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px 20px 6px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

.bubble.bot {
  background: transparent;
  padding: 0;
}

.bubble.bot p { margin-bottom: 12px; }
.bubble.bot p:last-child { margin-bottom: 0; }

/* Input */
.input-area {
  padding: 16px 28px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.ibox {
  background: var(--raised);
  border: 1px solid var(--border2);
  border-radius: 22px;
  padding: 12px 18px;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.ibox:focus-within {
  border-color: #c084fc;
  box-shadow: 0 0 0 5px rgba(192,132,252,0.15);
  transform: translateY(-1px);
}

#inp {
  background: none;
  border: none;
  outline: none;
  width: 100%;
  font-size: 15.5px;
  line-height: 1.55;
  resize: none;
  max-height: 180px;
  padding: 6px 0;
}

#sbtn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, #c084fc, #60a5fa);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 18px rgba(192,132,252,0.4);
  transition: all 0.2s;
}

#sbtn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 24px rgba(192,132,252,0.55);
}

/* Welcome */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 32px;
  padding-bottom: 80px;
}

.w-icon {
  width: 82px;
  height: 82px;
  background: linear-gradient(135deg, #c084fc, #60a5fa);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 60px rgba(192,132,252,0.45);
  animation: icon-pulse 6s ease-in-out infinite;
}

.chips {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  max-width: 620px;
  width: 100%;
}

.chip {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 18px 20px;
  text-align: left;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.chip:hover {
  transform: translateY(-3px);
  border-color: #c084fc;
  box-shadow: 0 12px 30px rgba(192,132,252,0.15);
}

/* ── UTILS ── */
@keyframes msg-in { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
@keyframes icon-pulse {
  0%,100% { box-shadow: 0 0 60px rgba(192,132,252,0.45); }
  50%     { box-shadow: 0 0 80px rgba(192,132,252,0.7); }
}

/* Mobile */
@media (max-width: 720px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  .chips { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- SVG ICONS -->
<svg style="display:none">
  <defs>
    <symbol id="ic-bot" viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" rx="3" fill="currentColor" opacity="0.95"/><rect x="8" y="4" width="8" height="6" rx="2" fill="currentColor" opacity="0.75"/><circle cx="9" cy="14" r="1.5" fill="#fff"/><circle cx="15" cy="14" r="1.5" fill="#fff"/></symbol>
    <symbol id="ic-send" viewBox="0 0 24 24"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></symbol>
    <symbol id="ic-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></symbol>
    <symbol id="ic-user" viewBox="0 0 24 24"><circle cx="12" cy="9" r="4" fill="currentColor" opacity="0.9"/><path d="M4 20C4 16.5 7.5 14 12 14C16.5 14 20 16.5 20 20" stroke="currentColor" stroke-width="2" fill="none"/></symbol>
  </defs>
</svg>

<div id="sb-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:29"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-header">
    <div class="sb-brand">
      <div class="sb-brand-dot">
        <svg width="22" height="22" style="color:#fff"><use href="#ic-bot"></use></svg>
      </div>
      <div class="sb-brand-name">Арк</div>
    </div>
    <button onclick="newChat()" style="background:none;border:none;color:var(--text3);width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center">
      <svg width="22" height="22"><use href="#ic-plus"></use></svg>
    </button>
  </div>

  <button class="new-chat" onclick="newChat()">
    <svg width="18" height="18"><use href="#ic-plus"></use></svg>
    Новый чат
  </button>

  <div style="padding:0 16px 8px;font-size:11px;font-weight:600;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase">История</div>
  <div id="chat-list" style="flex:1;overflow-y:auto"></div>

  <div class="sb-bottom">
    <div class="sb-user" onclick="toggleDrop()">
      <div class="av" id="sb-av" style="background:#27272f;border:1px solid var(--border2)">
        <svg width="18" height="18" style="color:#b0b0c0"><use href="#ic-user"></use></svg>
      </div>
      <div style="flex:1">
        <div id="sb-name" style="font-weight:600">Гость</div>
        <div id="sb-sub" style="font-size:12px;color:var(--text3)">Не авторизован</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <header>
    <div style="display:flex;gap:12px;align-items:center">
      <button onclick="toggleSidebar()" style="display:none;width:40px;height:40px;background:none;border:none;color:var(--text3);font-size:24px" id="menu-btn">☰</button>
      <div class="model-pill" id="model-pill">
        <span id="model-label">Medium</span>
        <span style="font-size:18px">›</span>
      </div>
    </div>

    <div style="display:flex;gap:8px">
      <button onclick="toggleTheme()" style="width:40px;height:40px;background:none;border:none;color:var(--text3);border-radius:10px">☀️</button>
      <button onclick="exportChat()" style="width:40px;height:40px;background:none;border:none;color:var(--text3);border-radius:10px">↓</button>
    </div>
  </header>

  <div id="msgs">
    <!-- Welcome filled by JS -->
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="ibox" id="ibox">
      <textarea id="inp" placeholder="Спроси что угодно... Арк ждёт 🔥" rows="1"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <div style="display:flex;gap:8px">
          <button onclick="document.getElementById('fileinput').click()" style="background:none;border:none;color:var(--text3);padding:6px 10px;border-radius:8px">📎</button>
        </div>
        <button id="sbtn" onclick="send()">
          <svg width="22" height="22" style="color:#fff"><use href="#ic-send"></use></svg>
        </button>
      </div>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:12px">Enter — отправить • Shift+Enter — новая строка</div>
  </div>
</div>

<input type="file" id="fileinput" style="display:none">

<script>
// ── FULL WORKING JS (оставил почти без изменений, только чуть причесал) ──
let chats = [];
let currentId = null;
let user = null;

function chatsKey() { return 'ark_chats_premium'; }

function saveChats() {
  localStorage.setItem(chatsKey(), JSON.stringify(chats));
}

function loadChats() {
  chats = JSON.parse(localStorage.getItem(chatsKey()) || '[]');
}

function newChat() {
  const id = 'c_' + Date.now().toString(36);
  chats.unshift({ id, title: 'Новый чат', msgs: [] });
  saveChats();
  switchChat(id);
}

function switchChat(id) {
  currentId = id;
  renderChats();
  renderMessages();
}

function renderChats() {
  const el = document.getElementById('chat-list');
  el.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id === currentId ? 'active' : ''}" onclick="switchChat('${c.id}')">
      <div style="flex:1;overflow:hidden;text-overflow:ellipsis">${c.title}</div>
    </div>
  `).join('');
}

function renderMessages() {
  const container = document.getElementById('msgs');
  container.innerHTML = '';

  const chat = chats.find(c => c.id === currentId);
  if (!chat || !chat.msgs.length) {
    container.innerHTML = `
      <div class="welcome">
        <div class="w-icon">
          <svg width="42" height="42" style="color:#fff"><use href="#ic-bot"></use></svg>
        </div>
        <h1 style="font-size:32px;font-weight:600;letter-spacing:-1px">Привет, я Арк</h1>
        <p style="font-size:18px;color:var(--text2);max-width:420px">Готов помочь с чем угодно. Просто напиши.</p>
        <div class="chips">
          <div class="chip" onclick="quickSend('Напиши мне красивый промпт для Midjourney')">🎨 Генерация картинок</div>
          <div class="chip" onclick="quickSend('Объясни квантовую физику как будто мне 12 лет')">🧠 Объясни сложно</div>
          <div class="chip" onclick="quickSend('Придумай 10 идей для стартапа в 2026')">🚀 Идеи для бизнеса</div>
          <div class="chip" onclick="quickSend('Напиши код React компонента с анимациями')">💻 Код</div>
        </div>
      </div>`;
    return;
  }

  chat.msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = `mg ${m.role}`;
    div.innerHTML = `
      <div class="av ${m.role === 'bot' ? 'ark' : ''}">
        ${m.role === 'bot' ? `<svg width="22" height="22" style="color:#fff"><use href="#ic-bot"></use></svg>` : '👤'}
      </div>
      <div style="max-width:620px">
        <div class="bubble ${m.role}">${m.role === 'bot' ? fmt(m.text) : escapeHtml(m.text)}</div>
      </div>`;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function fmt(text) {
  return text
    .replace(/```([\s\S]*?)```/g, (_, code) => `<pre style="background:#111113;padding:16px;border-radius:14px;overflow:auto;font-size:13px">${escapeHtml(code)}</pre>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  const chat = chats.find(c => c.id === currentId);
  if (!chat) return;

  chat.msgs.push({ role: 'user', text });
  if (chat.title === 'Новый чат') chat.title = text.substring(0, 32) + (text.length > 32 ? '…' : '');
  
  renderMessages();
  saveChats();
  inp.value = '';

  // Симуляция ответа (в реальном проекте здесь будет fetch)
  setTimeout(() => {
    const botReply = "Брат, это уже **гораздо** красивее, чем было у Claude. Что дальше хочешь улучшить? 🔥";
    chat.msgs.push({ role: 'bot', text: botReply });
    renderMessages();
    saveChats();
  }, 800);
}

function quickSend(text) {
  const inp = document.getElementById('inp');
  inp.value = text;
  send();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function toggleDrop() {
  alert('👑 Премиум аккаунт Арк');
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

function exportChat() {
  alert('✅ Чат сохранён в .md (в реальной версии скачается файл)');
}

// INIT
function init() {
  loadChats();
  if (!chats.length) newChat();
  else switchChat(chats[0].id);
  renderChats();
  renderMessages();

  // Enter support
  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
}

init();
</script>
</body>
</html>
