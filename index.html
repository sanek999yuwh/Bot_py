<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Арк</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
[data-theme="dark"] {
  --bg:        #0a0a0a;
  --sidebar:   #111111;
  --card:      #1a1a1a;
  --card2:     #222222;
  --raised:    #2a2a2a;
  --border:    #2a2a2a;
  --border2:   #333333;
  --text:      #e8e8e8;
  --text2:     #999999;
  --text3:     #555555;
  --accent:    #ffffff;
  --user-bg:   #1a1a1a;
  --code-bg:   #0d0d0d;
  --shadow:    rgba(0,0,0,0.6);
  --hover:     rgba(255,255,255,0.04);
  --active:    rgba(255,255,255,0.07);
}
[data-theme="light"] {
  --bg:        #ffffff;
  --sidebar:   #f7f7f7;
  --card:      #f0f0f0;
  --card2:     #e8e8e8;
  --raised:    #e0e0e0;
  --border:    #e8e8e8;
  --border2:   #d8d8d8;
  --text:      #111111;
  --text2:     #666666;
  --text3:     #aaaaaa;
  --accent:    #000000;
  --user-bg:   #f0f0f0;
  --code-bg:   #f5f5f5;
  --shadow:    rgba(0,0,0,0.08);
  --hover:     rgba(0,0,0,0.04);
  --active:    rgba(0,0,0,0.07);
}

/* ── Reset ── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; height:100dvh; overflow:hidden; overscroll-behavior:none; }

body {
  font-family: 'Geist', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Основные стили (оставлены почти без изменений) */
#sidebar { width: 256px; min-width: 256px; height: 100%; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; flex-shrink: 0; }
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; position: relative; }
#msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  scroll-behavior: smooth;
  padding: 16px 0;
  overscroll-behavior: contain;
}

/* === УЛУЧШЕНИЯ СТАБИЛЬНОСТИ STREAMING === */
.stream-cursor {
  min-height: 1.4em;
  display: inline-block;
}

.cblock {
  margin: 10px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border2);
  break-inside: avoid;
}

.cblock-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
}

.cblock pre {
  margin: 0;
  padding: 14px;
  overflow-x: auto;
  background: var(--code-bg);
  font-size: 13.5px;
}

.cblock pre code {
  display: block;
  white-space: pre;
  word-break: normal;
}

/* Остальные стили (оставляю как было) */
.bubble.user { background: var(--user-bg); color: var(--text); padding: 10px 14px; border-radius: 14px 14px 3px 14px; border: 1px solid var(--border2); }
.bubble.bot { background: transparent; color: var(--text); padding: 1px 0; }
.bubble.bot p { margin: 0; line-height: 1.6; }
.bubble.bot p + p { margin-top: 3px; }
.bubble.bot strong { font-weight: 600; color: var(--text); }
.bubble.bot code { font-family: 'Geist Mono', monospace; background: var(--card2); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border2); }

/* ... (все остальные твои стили остаются без изменений) ... */
</style>
</head>
<body>

<!-- Весь твой HTML (sidebar, main, welcome, chips и т.д.) остаётся без изменений. Я его не трогаю. -->

<script>
// ==================== ESC ====================
function esc(t) { 
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

// ==================== УЛУЧШЕННЫЙ FMT ====================
function fmt(text) {
  let result = String(text || '');

  // Code blocks — главное улучшение
  result = result.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const language = (lang || 'text').trim();
    const escapedCode = esc(code.trim());
    return `<div class="cblock">
      <div class="cblock-header">
        <span class="cblock-lang">${language}</span>
        <button class="cblock-copy" onclick="copyCode(this)">Копировать</button>
      </div>
      <pre><code>${escapedCode}</code></pre>
    </div>`;
  });

  // Inline code
  result = result.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Bold
  result = result.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  result = result.replace(/\*([^*]+)\*/g, '<strong>$1</strong>');

  // Lists
  result = result.replace(/^[•·\-]\s+(.+)$/gm, '<li>$1</li>');
  result = result.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  result = result.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, s => `<ul>${s}</ul>`);

  // Paragraphs
  const paragraphs = result.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(div|ul|ol|pre|table|cblock)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).filter(Boolean);

  return paragraphs.join('');
}

// ==================== UPDATE STREAM (стабильный) ====================
function updateStreamMsg(el, text) {
  const bubble = el.querySelector('#stream-bubble');
  if (!bubble) return;

  bubble.innerHTML = fmt(text);

  const msgs = document.getElementById('msgs');
  const isNearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 150;

  if (isNearBottom) {
    msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'auto' });
  }
}

// ==================== COPY CODE ====================
function copyCode(btn) {
  const code = btn.closest('.cblock').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const old = btn.textContent;
    btn.textContent = '✓ Скопировано';
    setTimeout(() => btn.textContent = old, 2000);
  });
}

// ==================== ОСТАЛЬНОЙ КОД ОСТАЁТСЯ БЕЗ ИЗМЕНЕНИЙ ====================
// appendMsg, addMsg, send, init, voice и т.д. — оставь как было у тебя

// В конце твоего скрипта (перед </script>) можешь оставить init();
init();
</script>
</body>
</html>
