<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Арк</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg:        #212121;
  --bg2:       #171717;
  --surface:   #2f2f2f;
  --surface2:  #3a3a3a;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.13);
  --text:      #ececec;
  --soft:      #8e8ea0;
  --muted:     #565869;
  --accent:    #10a37f;
  --accent2:   #1ac799;
  --accent-dim:rgba(16,163,127,0.15);
  --user-bg:   #2f2f2f;
  --code-bg:   #171717;
  --shadow:    rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg:        #ffffff;
  --bg2:       #f7f7f8;
  --surface:   #f0f0f0;
  --surface2:  #e4e4e4;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.13);
  --text:      #1a1a1a;
  --soft:      #6e6e80;
  --muted:     #adadc0;
  --accent:    #10a37f;
  --accent2:   #0d8a6a;
  --accent-dim:rgba(16,163,127,0.1);
  --user-bg:   #f0f0f0;
  --code-bg:   #f5f5f5;
  --shadow:    rgba(0,0,0,0.1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background 0.2s, color 0.2s;
}

/* ── HEADER ── */
header {
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 56px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand { display:flex;align-items:center;gap:10px; }

.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), #0d8a6a);
  border-radius: 8px;
  display: flex; align-items:center; justify-content:center;
  font-size: 16px; flex-shrink:0;
}

.brand-name { font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px; }

.hright { display:flex;align-items:center;gap:6px; }

/* Model pill */
.mpill {
  position: relative;
  display: flex; align-items:center; gap:5px;
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px; font-weight:500;
  color: var(--soft);
  transition: all 0.15s;
  user-select: none; white-space:nowrap;
}
.mpill:hover { background:var(--surface2);color:var(--text); }
.mpill svg { width:10px;height:10px;transition:transform 0.2s;flex-shrink:0; }
.mpill.open svg { transform:rotate(180deg); }

.mdrop {
  position:absolute;top:calc(100% + 6px);right:0;
  min-width:195px;background:var(--bg);
  border:1px solid var(--border2);border-radius:10px;
  overflow:hidden;display:none;
  box-shadow:0 12px 40px var(--shadow);z-index:200;
}
.mdrop.open { display:block;animation:popin 0.14s ease; }
@keyframes popin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.mitem {
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 13px;font-size:12.5px;font-weight:500;
  color:var(--soft);cursor:pointer;transition:background 0.1s;
  border-bottom:1px solid var(--border);
}
.mitem:last-child{border-bottom:none}
.mitem:hover{background:var(--surface);color:var(--text)}
.mitem.active{color:var(--accent)}
.mcheck{opacity:0;color:var(--accent);font-size:13px}
.mitem.active .mcheck{opacity:1}

.ibtn {
  width:32px;height:32px;
  background:transparent;border:1px solid var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--muted);
  transition:all 0.15s;
}
.ibtn:hover{background:var(--surface);color:var(--text);border-color:var(--border2)}

/* Theme toggle */
#themebtn { font-size:15px; }

/* ── MESSAGES ── */
#msgs {
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;
  scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

/* Welcome */
.welcome {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;gap:18px;padding:40px 20px;
  animation:fadeup 0.4s ease both;
}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.w-logo {
  width:60px;height:60px;
  background:linear-gradient(135deg,var(--accent),#0d8a6a);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 0 30px rgba(16,163,127,0.3);
}
.w-title{font-size:clamp(20px,5vw,28px);font-weight:700;color:var(--text);letter-spacing:-0.5px}
.w-sub{font-size:14px;color:var(--soft);max-width:300px;line-height:1.6}

.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:440px}
.chip{
  padding:7px 13px;background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;font-size:clamp(11.5px,2.8vw,13px);font-weight:500;
  color:var(--soft);cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.chip:hover,.chip:active{background:var(--surface2);color:var(--text);border-color:var(--accent)}

/* Message groups */
.msg-group {
  display:flex;flex-direction:column;
  padding:16px max(16px,calc(50% - 380px));
  animation:msgin 0.2s ease both;
  position:relative;
}
.msg-group:hover { background:rgba(128,128,128,0.04); }
@keyframes msgin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.msg-inner{display:flex;align-items:flex-start;gap:12px;max-width:100%;width:100%}
.msg-group.user .msg-inner{flex-direction:row-reverse;justify-content:flex-start}

.av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;margin-top:1px;
}
.av.ark{background:linear-gradient(135deg,var(--accent),#0d8a6a)}
.av.user{background:#5436da;font-size:12px;font-weight:700;color:white}

.msg-content{
  flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;
}
.msg-group.user .msg-content{align-items:flex-end;max-width:min(75%,520px)}
.msg-group.bot  .msg-content{align-items:flex-start;max-width:100%}

.bubble{
  font-size:clamp(13.5px,3.5vw,15px);
  line-height:1.75;
  word-break:break-word;overflow-wrap:anywhere;
}
.bubble.user{
  background:var(--user-bg);color:var(--text);
  padding:10px 14px;border-radius:12px 12px 2px 12px;
}
.bubble.bot{
  background:transparent;color:var(--text);
  padding:2px 0;width:100%;
}

/* Bot formatting */
.bubble.bot p{margin:5px 0}
.bubble.bot p:first-child{margin-top:0}
.bubble.bot p:last-child{margin-bottom:0}
.bubble.bot strong{font-weight:600}
.bubble.bot em{color:var(--soft);font-style:italic}
.bubble.bot h3,.bubble.bot h4{font-size:15px;font-weight:600;margin:10px 0 4px;color:var(--text)}
.bubble.bot ul,.bubble.bot ol{padding-left:20px;margin:6px 0}
.bubble.bot li{margin:3px 0}

.bubble.bot code{
  font-family:'JetBrains Mono',monospace;font-size:12.5px;
  background:var(--surface);color:var(--accent2);
  padding:2px 6px;border-radius:4px;border:1px solid var(--border2);
  word-break:break-all;
}

/* Code block wrapper */
.code-block{
  position:relative;margin:8px 0;
  border-radius:8px;overflow:hidden;
  border:1px solid var(--border2);
}
.code-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 14px;background:var(--surface2);
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soft);
}
.copy-code-btn{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;
  font-size:11px;color:var(--soft);font-family:'JetBrains Mono',monospace;
  padding:2px 6px;border-radius:4px;transition:all 0.15s;
}
.copy-code-btn:hover{color:var(--text);background:var(--border2)}
.bubble.bot pre{
  background:var(--code-bg);padding:12px 14px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0;
}
.bubble.bot pre code{
  background:none;border:none;padding:0;
  color:#a8d8ea;font-size:12.5px;word-break:normal;
}

/* Message actions */
.msg-actions{
  display:flex;gap:4px;margin-top:4px;
  opacity:0;transition:opacity 0.15s;
}
.msg-group:hover .msg-actions{opacity:1}
.act-btn{
  display:flex;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;
  font-size:11px;color:var(--muted);padding:3px 7px;
  border-radius:5px;transition:all 0.15s;font-family:'Inter',sans-serif;
}
.act-btn:hover{background:var(--surface);color:var(--text)}
.act-btn.copied{color:var(--accent)}

.mtime{font-size:10.5px;color:var(--muted);padding:1px 2px}

/* Typing */
.typing-group{
  display:flex;flex-direction:column;
  padding:16px max(16px,calc(50% - 380px));
  animation:msgin 0.2s ease both;
}
.typing-inner{display:flex;align-items:flex-start;gap:12px}
.typing-dots{display:flex;align-items:center;gap:4px;padding:10px 2px}
.td{width:6px;height:6px;background:var(--soft);border-radius:50%;animation:tdot 1.3s ease-in-out infinite}
.td:nth-child(2){animation-delay:0.18s}
.td:nth-child(3){animation-delay:0.36s}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-5px);opacity:1}}

/* ── INPUT ── */
.input-wrap{
  z-index:20;
  padding:10px max(16px,calc(50% - 380px));
  padding-bottom:max(10px,env(safe-area-inset-bottom,10px));
  background:var(--bg);border-top:1px solid var(--border);
  flex-shrink:0;
}

/* File preview */
#file-preview{
  display:none;align-items:center;gap:8px;
  padding:8px 12px;margin-bottom:8px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;font-size:12.5px;color:var(--soft);
}
#file-preview.show{display:flex}
#file-preview .fname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
#file-preview .fremove{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:16px;line-height:1;
  transition:color 0.15s;padding:0 2px;
}
#file-preview .fremove:hover{color:var(--text)}

.ibox{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:8px 8px 8px 14px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.ibox:focus-within{
  border-color:rgba(16,163,127,0.4);
  box-shadow:0 0 0 3px rgba(16,163,127,0.06);
}

.ibtns-left{display:flex;align-items:center;gap:2px;flex-shrink:0}

.i-icon-btn{
  width:32px;height:32px;background:none;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:16px;
  border-radius:6px;transition:all 0.15s;flex-shrink:0;
}
.i-icon-btn:hover{background:var(--surface2);color:var(--text)}

#inp{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Inter',sans-serif;
  font-size:clamp(13.5px,3.5vw,15px);font-weight:400;
  resize:none;max-height:160px;line-height:1.55;
  padding:3px 0;min-width:0;-webkit-appearance:none;
}
#inp::placeholder{color:var(--muted)}

#sbtn{
  width:34px;height:34px;min-width:34px;
  background:var(--accent);border:none;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:white;font-size:15px;font-weight:700;
  flex-shrink:0;transition:all 0.15s;-webkit-appearance:none;
}
#sbtn:hover{background:var(--accent2)}
#sbtn:active{transform:scale(0.92)}
#sbtn:disabled{opacity:0.3;transform:none;cursor:not-allowed}

.ihint{text-align:center;margin-top:7px;font-size:11px;color:var(--muted)}

/* Toast */
#toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;padding:8px 16px;
  font-size:13px;font-weight:500;color:var(--text);
  opacity:0;transition:all 0.25s ease;
  z-index:999;pointer-events:none;
  box-shadow:0 8px 24px var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Hidden file input */
#fileinput{display:none}

@media(max-width:480px){
  header{padding:0 12px}
  .msg-group,.typing-group,.input-wrap{padding-left:12px;padding-right:12px}
  .bubble{font-size:14px}
  .ihint{display:none}
  .msg-actions{opacity:1}
}
</style>
</head>
<body>
<div id="toast"></div>
<input type="file" id="fileinput" accept=".txt,.pdf,.py,.js,.json,.csv,.md">

<header>
  <div class="brand">
    <div class="logo">🤖</div>
    <div class="brand-name">Арк</div>
  </div>
  <div class="hright">
    <div class="mpill" id="mpill">
      <span id="mlabel">Medium</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      <div class="mdrop" id="mdrop"></div>
    </div>
    <div class="ibtn" id="themebtn" title="Сменить тему">🌙</div>
    <div class="ibtn" id="clrbtn" title="Очистить">🗑</div>
  </div>
</header>

<div id="msgs">
  <div class="welcome" id="welcome">
    <div class="w-logo">🤖</div>
    <div class="w-title">Чем могу помочь?</div>
    <div class="w-sub">Задай вопрос, загрузи файл или выбери тему ниже</div>
    <div class="chips">
      <div class="chip" onclick="chip('Что ты умеешь?')">✨ Что умеешь?</div>
      <div class="chip" onclick="chip('Напиши код на Python')">🐍 Код</div>
      <div class="chip" onclick="chip('Как работает интернет?')">🌐 Интернет</div>
      <div class="chip" onclick="chip('Помоги придумать идею')">💡 Идея</div>
      <div class="chip" onclick="chip('Расскажи что-то интересное')">🎲 Удиви</div>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div id="file-preview">
    <span>📎</span>
    <span class="fname" id="fname"></span>
    <button class="fremove" onclick="removeFile()">×</button>
  </div>
  <div class="ibox">
    <div class="ibtns-left">
      <button class="i-icon-btn" onclick="document.getElementById('fileinput').click()" title="Прикрепить файл">📎</button>
    </div>
    <textarea id="inp" placeholder="Сообщение Арку..." rows="1"></textarea>
    <button id="sbtn" onclick="send()">➤</button>
  </div>
  <div class="ihint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — перенос</div>
</div>

<script>
// ── State ──
const SID_KEY = 'ark_sid';
let sid = localStorage.getItem(SID_KEY);
if (!sid) { sid = 'w_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); localStorage.setItem(SID_KEY, sid); }

let model = 'mistral-medium-latest';
let busy = false;
let attachedFile = null;
let attachedText = '';
const MODELS = {};

// ── Theme ──
const savedTheme = localStorage.getItem('ark_theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeBtn(savedTheme);

function updateThemeBtn(t) {
  document.getElementById('themebtn').textContent = t === 'dark' ? '🌙' : '☀️';
}

document.getElementById('themebtn').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ark_theme', next);
  updateThemeBtn(next);
});

// ── File upload ──
document.getElementById('fileinput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 500000) { toast('⚠️ Файл слишком большой (макс 500KB)'); return; }
  attachedFile = file;
  document.getElementById('fname').textContent = file.name;
  document.getElementById('file-preview').classList.add('show');
  const reader = new FileReader();
  reader.onload = ev => { attachedText = ev.target.result; };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
});

function removeFile() {
  attachedFile = null; attachedText = '';
  document.getElementById('file-preview').classList.remove('show');
  document.getElementById('fname').textContent = '';
}

// ── Init ──
async function init() {
  try {
    const d = await (await fetch('/api/models')).json();
    Object.assign(MODELS, d.models);
    model = d.default;
    buildDrop(); syncLabel();
  } catch(e){}

  const ta = document.getElementById('inp');
  ta.addEventListener('input', grow);
  ta.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  window.addEventListener('resize', () => { document.getElementById('msgs').scrollTop = 99999; });
}

function grow() {
  const el = document.getElementById('inp');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ── Model dropdown ──
function buildDrop() {
  document.getElementById('mdrop').innerHTML = Object.entries(MODELS).map(([id,lbl]) =>
    `<div class="mitem ${id===model?'active':''}" onclick="pickModel('${id}')">
      <span>${lbl}</span><span class="mcheck">✓</span>
    </div>`).join('');
}
function syncLabel() {
  const lbl = MODELS[model]||model;
  document.getElementById('mlabel').textContent = lbl.split('—')[0].trim().replace(/[^\wа-яёА-ЯЁ\s⚡🧠🔥🆓]/g,'').trim();
}
function pickModel(id) {
  model=id; syncLabel(); buildDrop(); closeDD();
  toast('✅ '+(MODELS[id]||id));
}
document.getElementById('mpill').addEventListener('click', e => {
  if (e.target.closest('.mitem')) return;
  const o = document.getElementById('mdrop').classList.toggle('open');
  document.getElementById('mpill').classList.toggle('open',o);
});
document.addEventListener('click', e => { if(!e.target.closest('#mpill')) closeDD(); });
function closeDD() {
  document.getElementById('mdrop').classList.remove('open');
  document.getElementById('mpill').classList.remove('open');
}

// ── Format ──
function ts() { return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  // code blocks with header
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const l = lang || 'code';
    return `<div class="code-block">
      <div class="code-header">
        <span>${l}</span>
        <button class="copy-code-btn" onclick="copyCode(this)">📋 Копировать</button>
      </div>
      <pre><code>${esc(code.trim())}</code></pre>
    </div>`;
  });
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');
  text = text.replace(/^###\s+(.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^##\s+(.+)$/gm,  '<h3>$1</h3>');
  text = text.replace(/^[•·\-]\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, s=>`<ul>${s}</ul>`);
  return text.split(/\n{2,}/).map(p => {
    p = p.trim(); if(!p) return '';
    if(/^<(div|ul|ol|h[1-6])/.test(p)) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).filter(Boolean).join('');
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✅ Скопировано';
    setTimeout(() => btn.textContent = '📋 Копировать', 2000);
  });
}

// ── Render ──
function addMsg(role, text, isFile=false) {
  document.getElementById('welcome')?.remove();
  const msgs = document.getElementById('msgs');
  const isBot = role==='bot';
  const g = document.createElement('div');
  g.className = `msg-group ${role}`;

  const av = isBot
    ? `<div class="av ark">🤖</div>`
    : `<div class="av user">Вы</div>`;

  const content = isBot ? fmt(text) : esc(text).replace(/\n/g,'<br>');

  const actions = isBot ? `
    <div class="msg-actions">
      <button class="act-btn" onclick="copyMsg(this)">📋 Копировать</button>
    </div>` : '';

  g.innerHTML = `
    <div class="msg-inner">
      ${av}
      <div class="msg-content">
        <div class="bubble ${isBot?'bot':'user'}">${content}</div>
        ${actions}
        <div class="mtime">${ts()}</div>
      </div>
    </div>`;

  msgs.appendChild(g);
  msgs.scrollTop = msgs.scrollHeight;
}

function copyMsg(btn) {
  const text = btn.closest('.msg-content').querySelector('.bubble').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Копировать'; btn.classList.remove('copied'); }, 2000);
  });
}

function showTyping() {
  document.getElementById('welcome')?.remove();
  const msgs = document.getElementById('msgs');
  const el = document.createElement('div');
  el.className='typing-group';el.id='typing';
  el.innerHTML=`<div class="typing-inner"><div class="av ark">🤖</div><div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

// ── Send ──
async function send() {
  if(busy) return;
  const ta = document.getElementById('inp');
  let text = ta.value.trim();
  if(!text && !attachedFile) return;

  // Attach file content to message
  let msgToSend = text;
  if(attachedFile && attachedText) {
    const fname = attachedFile.name;
    msgToSend = `[Файл: ${fname}]\n\n${attachedText}\n\n${text || 'Проанализируй этот файл'}`;
    addMsg('user', `📎 ${fname}${text ? '\n'+text : ''}`);
  } else {
    addMsg('user', text);
  }

  ta.value=''; ta.style.height='auto';
  removeFile();

  busy=true;
  document.getElementById('sbtn').disabled=true;
  showTyping();

  try {
    const r = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msgToSend,session_id:sid,model})
    });
    const d = await r.json();
    hideTyping();
    addMsg('bot',d.reply);
  } catch {
    hideTyping();
    addMsg('bot','⚠️ Ошибка соединения.');
  }

  busy=false;
  document.getElementById('sbtn').disabled=false;
  ta.focus();
}

function chip(t){document.getElementById('inp').value=t;send()}

// ── Clear ──
document.getElementById('clrbtn').addEventListener('click', async()=>{
  if(!confirm('Очистить историю?')) return;
  await fetch('/api/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});
  document.getElementById('msgs').innerHTML='';
  toast('🗑 Очищено');
});

// ── Toast ──
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

init();
</script>
