<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Арк — Цифровой Ассистент</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,106,247,0.3);
    --text: #e8e6f0;
    --text-muted: #6b6880;
    --user-bubble: #1e1b4b;
    --bot-bubble: #16161f;
    --danger: #f87171;
    --success: #34d399;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(167,139,250,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px var(--accent-glow);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
    50% { box-shadow: 0 0 35px rgba(124,106,247,0.5); }
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .model-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    transition: all 0.2s;
    position: relative;
  }

  .model-selector:hover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.1);
  }

  .model-dot {
    width: 7px;
    height: 7px;
    background: var(--success);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .model-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    min-width: 220px;
    display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 100;
  }

  .model-dropdown.open { display: block; animation: dropdown-in 0.15s ease; }

  @keyframes dropdown-in {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .model-option {
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .model-option:hover { background: var(--surface2); color: var(--text); }
  .model-option.active { color: var(--accent2); }
  .model-option.active::after { content: '✓'; color: var(--success); }

  .btn-icon {
    width: 38px;
    height: 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    transition: all 0.2s;
  }

  .btn-icon:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: msg-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 780px;
    width: 100%;
  }

  .msg-row.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-row.bot { align-self: flex-start; }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .avatar.ark {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 15px var(--accent-glow);
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.65;
    word-wrap: break-word;
  }

  .bubble.ark {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid rgba(124,106,247,0.3);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .bubble code {
    font-family: 'Space Mono', monospace;
    background: rgba(124,106,247,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent2);
  }

  .bubble pre code {
    background: none;
    padding: 0;
    color: #c9d1d9;
  }

  .bubble strong { color: var(--accent2); font-weight: 600; }

  .bubble ul, .bubble ol {
    padding-left: 18px;
    margin: 6px 0;
  }

  .bubble li { margin: 3px 0; }

  .msg-time {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg-row.user .msg-time { text-align: right; }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 20px;
    padding: 40px 20px;
    animation: fade-in 0.6s ease;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    box-shadow: 0 0 60px var(--accent-glow);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  .welcome h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p {
    color: var(--text-muted);
    max-width: 360px;
    line-height: 1.6;
    font-size: 14px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(124,106,247,0.1);
    transform: translateY(-1px);
  }

  /* INPUT */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px 10px 16px;
    transition: border-color 0.2s;
    max-width: 900px;
    margin: 0 auto;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.1);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14.5px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 2px 0;
  }

  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: white;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  #send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 25px var(--accent-glow); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Markdown formatting in messages */
  .bubble p { margin: 4px 0; }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .bubble { max-width: 85%; font-size: 14px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">АРК</div>
      <div class="logo-sub">Digital Assistant</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="model-selector" id="modelSelector">
      <div class="model-dot"></div>
      <span id="modelLabel">Medium</span>
      <span style="color:var(--text-muted); font-size:10px">▾</span>
      <div class="model-dropdown" id="modelDropdown"></div>
    </div>
    <div class="btn-icon" id="clearBtn" title="Очистить историю">🗑️</div>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h1>Привет, я Арк!</h1>
    <p>Твой цифровой ассистент. Задай любой вопрос, попроси помочь с задачей или просто поговори.</p>
    <div class="chips">
      <div class="chip" onclick="sendChip('Что ты умеешь?')">Что ты умеешь?</div>
      <div class="chip" onclick="sendChip('Напиши код на Python')">Код на Python</div>
      <div class="chip" onclick="sendChip('Объясни как работает интернет')">Как работает интернет?</div>
      <div class="chip" onclick="sendChip('Помоги придумать идею для проекта')">Идея для проекта</div>
      <div class="chip" onclick="sendChip('Расскажи что-нибудь интересное')">Что-то интересное</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Напиши сообщение..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</div>
</div>

<script>
// ===================== STATE =====================
const SESSION_ID = 'web_' + Math.random().toString(36).substr(2, 9) +
  (localStorage.getItem('ark_session') || (() => {
    const id = Date.now().toString(36);
    localStorage.setItem('ark_session', id);
    return id;
  })());

let currentModel = 'mistral-medium-latest';
let isLoading = false;
const MODELS = {};

// ===================== INIT =====================
async function init() {
  const res = await fetch('/api/models');
  const data = await res.json();
  Object.assign(MODELS, data.models);
  currentModel = data.default;
  renderModelDropdown();
  updateModelLabel();

  const textarea = document.getElementById('user-input');
  textarea.addEventListener('input', autoResize);
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

function autoResize() {
  const el = document.getElementById('user-input');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===================== MODELS =====================
function renderModelDropdown() {
  const dd = document.getElementById('modelDropdown');
  dd.innerHTML = Object.entries(MODELS).map(([id, label]) => `
    <div class="model-option ${id === currentModel ? 'active' : ''}"
         onclick="selectModel('${id}', '${label}')">
      ${label}
    </div>
  `).join('');
}

function updateModelLabel() {
  const label = MODELS[currentModel] || currentModel;
  const short = label.split('—')[0].trim().replace(/[^a-zA-Zа-яА-Я0-9⚡🧠🔥🆓]/g, '').trim();
  document.getElementById('modelLabel').textContent = short || label;
}

function selectModel(id, label) {
  currentModel = id;
  updateModelLabel();
  renderModelDropdown();
  closeDropdown();
  showToast('✅ Модель: ' + (MODELS[id] || id));
}

document.getElementById('modelSelector').addEventListener('click', e => {
  if (e.target.closest('.model-option')) return;
  const dd = document.getElementById('modelDropdown');
  dd.classList.toggle('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('#modelSelector')) closeDropdown();
});

function closeDropdown() {
  document.getElementById('modelDropdown').classList.remove('open');
}

// ===================== MESSAGES =====================
function getTime() {
  return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatMessage(text) {
  // Code blocks
  text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escapeHtml(code.trim())}</code></pre>`);

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<strong>$1</strong>');

  // Lists
  text = text.replace(/^[•·]\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`);

  // Paragraphs
  text = text.split('\n\n').map(p => {
    if (p.startsWith('<')) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');

  return text;
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const isArk = role === 'bot';
  const avatar = `<div class="avatar ${isArk ? 'ark' : 'user'}">${isArk ? '🤖' : '👤'}</div>`;
  const content = `
    <div>
      <div class="bubble ${isArk ? 'ark' : 'user'}">${isArk ? formatMessage(text) : escapeHtml(text).replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;

  row.innerHTML = isArk ? avatar + content : content + avatar;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function addTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="avatar ark">🤖</div>
    <div class="bubble ark typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ===================== SEND =====================
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: SESSION_ID,
        model: currentModel
      })
    });
    const data = await res.json();
    removeTyping();
    addMessage('bot', data.reply);
  } catch (e) {
    removeTyping();
    addMessage('bot', '⚠️ Ошибка соединения. Проверь, запущен ли сервер.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function sendChip(text) {
  const input = document.getElementById('user-input');
  input.value = text;
  sendMessage();
}

// ===================== CLEAR =====================
document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!confirm('Очистить историю чата?')) return;
  await fetch('/api/clear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: SESSION_ID })
  });
  document.getElementById('messages').innerHTML = '';
  showToast('🗑️ История очищена');
});

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===================== START =====================
init();
</script>
</body>
</html>
