<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Арк</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #212121;
  --sidebar:    #171717;
  --surface:    #2f2f2f;
  --surface2:   #3a3a3a;
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.13);
  --accent:     #10a37f;
  --accent2:    #1ac799;
  --accent-dim: rgba(16,163,127,0.15);
  --accent-glow:rgba(16,163,127,0.25);
  --text:       #ececec;
  --soft:       #8e8ea0;
  --muted:      #565869;
  --user-bg:    #2f2f2f;
  --bot-bg:     transparent;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  font-size: 15px;
}

/* ── HEADER ── */
header {
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 56px;
}

.brand {
  display: flex; align-items: center; gap: 10px;
}

.logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), #0d8a6a);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.brand-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}

.hright {
  display: flex; align-items: center; gap: 8px;
}

/* Model pill */
.mpill {
  position: relative;
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 12.5px; font-weight: 500;
  color: var(--soft);
  transition: all 0.15s;
  user-select: none;
  white-space: nowrap;
}
.mpill:hover { background: var(--surface2); color: var(--text); }
.mpill svg { width:11px;height:11px;transition:transform 0.2s;flex-shrink:0; }
.mpill.open svg { transform:rotate(180deg); }

.mdrop {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 200px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  display: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  z-index: 200;
}
.mdrop.open { display:block;animation:popin 0.15s ease; }
@keyframes popin { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.mitem {
  display: flex; justify-content:space-between; align-items:center;
  padding: 10px 14px;
  font-size: 13px; font-weight: 500;
  color: var(--soft);
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid var(--border);
}
.mitem:last-child { border-bottom:none; }
.mitem:hover { background:var(--surface2); color:var(--text); }
.mitem.active { color:var(--accent2); }
.mcheck { opacity:0;color:var(--accent);font-size:14px; }
.mitem.active .mcheck { opacity:1; }

.ibtn {
  width:34px;height:34px;
  background:transparent;border:1px solid var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--muted);
  transition:all 0.15s;
}
.ibtn:hover { background:var(--surface);color:var(--text);border-color:var(--border2); }

/* ── MESSAGES ── */
#msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 16px;
  display: flex;
  flex-direction: column;
  position: relative;
  scroll-behavior: smooth;
}

#msgs::-webkit-scrollbar { width:4px; }
#msgs::-webkit-scrollbar-thumb { background:var(--surface2);border-radius:4px; }

/* Welcome */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 20px;
  padding: 40px 20px;
  animation: fadeup 0.4s ease both;
}
@keyframes fadeup { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.w-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), #0d8a6a);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  box-shadow: 0 0 40px var(--accent-glow);
}

.w-title {
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}

.w-sub {
  font-size: 14px;
  color: var(--soft);
  max-width: 320px;
  line-height: 1.6;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 440px;
}

.chip {
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  font-size: clamp(12px,2.8vw,13px);
  font-weight: 500;
  color: var(--soft);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover,.chip:active {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
}

/* Message groups */
.msg-group {
  display: flex;
  flex-direction: column;
  padding: 16px max(16px, calc(50% - 380px));
  gap: 0;
  border-bottom: 1px solid transparent;
  animation: msgin 0.22s ease both;
}
.msg-group.user { align-items: flex-end; }
.msg-group.bot  { align-items: flex-start; }
.msg-group:hover { background: rgba(255,255,255,0.015); }

@keyframes msgin { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg-inner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  max-width: 100%;
  width: 100%;
}
.msg-group.user .msg-inner { flex-direction: row-reverse; justify-content: flex-start; }

.av {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.av.ark  { background: linear-gradient(135deg,var(--accent),#0d8a6a); }
.av.user { background: #5436da; font-size: 13px; font-weight: 700; color: white; }

.msg-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.msg-group.user .msg-content { align-items: flex-end; max-width: min(75%, 500px); }
.msg-group.bot  .msg-content { align-items: flex-start; max-width: 100%; }

.bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: clamp(13.5px,3.5vw,15px);
  line-height: 1.7;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.bubble.user {
  background: var(--user-bg);
  color: var(--text);
  border-radius: 12px 12px 2px 12px;
}

.bubble.bot {
  background: transparent;
  color: var(--text);
  padding: 2px 0;
  width: 100%;
}

/* Bot content formatting */
.bubble.bot p { margin: 6px 0; }
.bubble.bot p:first-child { margin-top: 0; }
.bubble.bot p:last-child  { margin-bottom: 0; }
.bubble.bot strong { color: var(--text); font-weight: 600; }
.bubble.bot em { color: var(--soft); }

.bubble.bot code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  background: var(--surface);
  color: var(--accent2);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  word-break: break-all;
}

.bubble.bot pre {
  background: var(--sidebar);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
  -webkit-overflow-scrolling: touch;
}

.bubble.bot pre code {
  background:none;border:none;padding:0;
  color:#a8d8ea;font-size:12.5px;word-break:normal;
}

.bubble.bot ul,.bubble.bot ol { padding-left:20px;margin:6px 0; }
.bubble.bot li { margin:3px 0; }
.bubble.bot h3,.bubble.bot h4 { font-size:15px;font-weight:600;margin:10px 0 4px; }

.mtime {
  font-size: 11px;
  color: var(--muted);
  padding: 2px 2px 0;
}

/* Typing */
.typing-group {
  display: flex;
  flex-direction: column;
  padding: 16px max(16px, calc(50% - 380px));
  animation: msgin 0.2s ease both;
}
.typing-inner {
  display: flex; align-items: flex-start; gap: 12px;
}
.typing-dots {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 4px;
}
.td {
  width:7px;height:7px;
  background:var(--soft);border-radius:50%;
  animation:tdot 1.3s ease-in-out infinite;
}
.td:nth-child(2){animation-delay:0.18s}
.td:nth-child(3){animation-delay:0.36s}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-5px);opacity:1}}

/* ── INPUT AREA ── */
.input-wrap {
  z-index: 20;
  padding: 12px max(16px, calc(50% - 380px));
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.ibox {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.ibox:focus-within {
  border-color: rgba(16,163,127,0.4);
  box-shadow: 0 0 0 3px rgba(16,163,127,0.07);
}

#inp {
  flex: 1;
  background: none;
  border: none; outline: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: clamp(13.5px,3.5vw,15px);
  font-weight: 400;
  resize: none;
  max-height: 160px;
  line-height: 1.55;
  padding: 2px 0;
  min-width: 0;
  -webkit-appearance: none;
}
#inp::placeholder { color: var(--muted); }

#sbtn {
  width: 36px; height: 36px; min-width: 36px;
  background: var(--accent);
  border: none; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: white;
  font-size: 15px; font-weight: 700;
  flex-shrink: 0;
  transition: all 0.15s;
  -webkit-appearance: none;
}
#sbtn:hover  { background: var(--accent2); }
#sbtn:active { transform: scale(0.93); }
#sbtn:disabled { opacity: 0.3; transform: none; cursor: not-allowed; }

.ihint {
  text-align: center; margin-top: 8px;
  font-size: 11px; color: var(--muted);
}

/* Toast */
#toast {
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;padding:8px 16px;
  font-size:13px;font-weight:500;color:var(--text);
  opacity:0;transition:all 0.25s ease;
  z-index:999;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
#toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

@media (max-width:480px) {
  header { padding:10px 14px; }
  .msg-group,.typing-group,.input-wrap { padding-left:14px;padding-right:14px; }
  .bubble { font-size:14px; }
  .ihint { display:none; }
}
</style>
</head>
<body>
<div id="toast"></div>

<header>
  <div class="brand">
    <div class="logo">🤖</div>
    <div class="brand-name">Арк</div>
  </div>
  <div class="hright">
    <div class="mpill" id="mpill">
      <span id="mlabel">Medium</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      <div class="mdrop" id="mdrop"></div>
    </div>
    <div class="ibtn" id="clrbtn" title="Очистить">🗑</div>
  </div>
</header>

<div id="msgs">
  <div class="welcome" id="welcome">
    <div class="w-logo">🤖</div>
    <div class="w-title">Чем могу помочь?</div>
    <div class="w-sub">Задай любой вопрос или выбери тему ниже</div>
    <div class="chips">
      <div class="chip" onclick="chip('Что ты умеешь?')">✨ Что умеешь?</div>
      <div class="chip" onclick="chip('Напиши код на Python')">🐍 Код</div>
      <div class="chip" onclick="chip('Объясни как работает интернет')">🌐 Как работает интернет?</div>
      <div class="chip" onclick="chip('Помоги придумать идею для проекта')">💡 Идея</div>
      <div class="chip" onclick="chip('Расскажи что-нибудь интересное')">🎲 Удиви меня</div>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="ibox">
    <textarea id="inp" placeholder="Сообщение Арку..." rows="1"></textarea>
    <button id="sbtn" onclick="send()">➤</button>
  </div>
  <div class="ihint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — перенос строки</div>
</div>

<script>
const SID_KEY = 'ark_sid';
let sid = localStorage.getItem(SID_KEY);
if (!sid) { sid = 'w_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); localStorage.setItem(SID_KEY, sid); }

let model = 'mistral-medium-latest';
let busy = false;
const MODELS = {};

async function init() {
  try {
    const d = await (await fetch('/api/models')).json();
    Object.assign(MODELS, d.models);
    model = d.default;
    buildDrop(); syncLabel();
  } catch(e){}

  const ta = document.getElementById('inp');
  ta.addEventListener('input', grow);
  ta.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  window.addEventListener('resize', () => {
    document.getElementById('msgs').scrollTop = 99999;
  });
}

function grow() {
  const el = document.getElementById('inp');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function buildDrop() {
  document.getElementById('mdrop').innerHTML = Object.entries(MODELS).map(([id,lbl]) =>
    `<div class="mitem ${id===model?'active':''}" onclick="pickModel('${id}')">
      <span>${lbl}</span><span class="mcheck">✓</span>
    </div>`).join('');
}

function syncLabel() {
  const lbl = MODELS[model] || model;
  document.getElementById('mlabel').textContent = lbl.split('—')[0].trim().replace(/[^\wа-яёА-ЯЁ\s⚡🧠🔥🆓]/g,'').trim();
}

function pickModel(id) {
  model = id; syncLabel(); buildDrop(); closeDD();
  toast('✅ ' + (MODELS[id]||id));
}

document.getElementById('mpill').addEventListener('click', e => {
  if (e.target.closest('.mitem')) return;
  const dd = document.getElementById('mdrop');
  const o = dd.classList.toggle('open');
  document.getElementById('mpill').classList.toggle('open', o);
});
document.addEventListener('click', e => { if (!e.target.closest('#mpill')) closeDD(); });
function closeDD() {
  document.getElementById('mdrop').classList.remove('open');
  document.getElementById('mpill').classList.remove('open');
}

function ts() { return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  // code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) =>
    `<pre><code>${esc(c.trim())}</code></pre>`);
  // inline code
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');
  // headers
  text = text.replace(/^###\s+(.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^##\s+(.+)$/gm,  '<h3>$1</h3>');
  // lists
  text = text.replace(/^[•·\-]\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, s=>`<ul>${s}</ul>`);
  // paragraphs
  return text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(pre|ul|ol|h[1-6])/.test(p)) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).filter(Boolean).join('');
}

function addMsg(role, text) {
  document.getElementById('welcome')?.remove();
  const msgs = document.getElementById('msgs');
  const isBot = role === 'bot';
  const g = document.createElement('div');
  g.className = `msg-group ${role}`;

  const avHTML = isBot
    ? `<div class="av ark">🤖</div>`
    : `<div class="av user">Вы</div>`;

  const content = isBot ? fmt(text) : esc(text).replace(/\n/g,'<br>');

  g.innerHTML = `
    <div class="msg-inner">
      ${avHTML}
      <div class="msg-content">
        <div class="bubble ${isBot?'bot':'user'}">${content}</div>
        <div class="mtime">${ts()}</div>
      </div>
    </div>`;

  msgs.appendChild(g);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  document.getElementById('welcome')?.remove();
  const msgs = document.getElementById('msgs');
  const el = document.createElement('div');
  el.className = 'typing-group'; el.id = 'typing';
  el.innerHTML = `
    <div class="typing-inner">
      <div class="av ark">🤖</div>
      <div class="typing-dots">
        <div class="td"></div><div class="td"></div><div class="td"></div>
      </div>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function send() {
  if (busy) return;
  const ta = document.getElementById('inp');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height = 'auto';
  addMsg('user', text);
  busy = true;
  document.getElementById('sbtn').disabled = true;
  showTyping();
  try {
    const r = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text, session_id:sid, model})
    });
    const d = await r.json();
    hideTyping();
    addMsg('bot', d.reply);
  } catch {
    hideTyping();
    addMsg('bot','⚠️ Ошибка соединения.');
  }
  busy = false;
  document.getElementById('sbtn').disabled = false;
  ta.focus();
}

function chip(t) { document.getElementById('inp').value=t; send(); }

document.getElementById('clrbtn').addEventListener('click', async () => {
  if (!confirm('Очистить историю?')) return;
  await fetch('/api/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});
  document.getElementById('msgs').innerHTML='';
  toast('🗑 Очищено');
});

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

init();
</script>
</body>
</html>
